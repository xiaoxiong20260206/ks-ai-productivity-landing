<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFlicker 成长历程</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f0f9ff 100%);
      min-height: 100vh;
      padding: 40px 60px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .title {
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
      text-align: center;
      margin-bottom: 48px;
    }
    
    .timeline {
      display: flex;
      justify-content: space-between;
      position: relative;
      padding-top: 40px;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      top: 60px;
      left: 10%;
      right: 10%;
      height: 4px;
      background: linear-gradient(90deg, #2563eb 0%, #7c3aed 50%, #d97706 100%);
      border-radius: 2px;
    }
    
    .stage {
      flex: 1;
      text-align: center;
      position: relative;
      padding: 0 20px;
    }
    
    .dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      position: absolute;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      border: 4px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    
    .stage:nth-child(1) .dot { background: #2563eb; }
    .stage:nth-child(2) .dot { background: #16a34a; }
    .stage:nth-child(3) .dot { background: #7c3aed; }
    .stage:nth-child(4) .dot { background: #d97706; }
    
    .year {
      font-size: 18px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 12px;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      border: 1px solid #e2e8f0;
      margin-top: 60px;
    }
    
    .product-name {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 8px;
    }
    
    .stage-name {
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    
    .stage:nth-child(1) .stage-name { background: #dbeafe; color: #1d4ed8; }
    .stage:nth-child(2) .stage-name { background: #dcfce7; color: #15803d; }
    .stage:nth-child(3) .stage-name { background: #ede9fe; color: #6d28d9; }
    .stage:nth-child(4) .stage-name { background: #fef3c7; color: #b45309; }
    
    .desc {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
    }
    
    .highlight {
      color: #2563eb;
      font-weight: 500;
    }
    
    .arrow {
      position: absolute;
      top: 52px;
      right: -20px;
      width: 0;
      height: 0;
      border-left: 8px solid #64748b;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      opacity: 0.3;
    }
    
    .stage:last-child .arrow {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">从代码补全到全能伙伴：三年成长历程</h1>
    
    <div class="timeline">
      <div class="stage">
        <div class="dot"></div>
        <div class="year">2024年</div>
        <div class="card">
          <div class="product-name">Kwaipilot</div>
          <span class="stage-name">Code Copilot</span>
          <p class="desc">以 Kwaipilot 身份入职，代码补全和智能问答，快手研发覆盖率从 <span class="highlight">0 → 40%</span></p>
        </div>
      </div>
      
      <div class="stage">
        <div class="dot"></div>
        <div class="year">2025年</div>
        <div class="card">
          <div class="product-name">Kwaipilot</div>
          <span class="stage-name">Code Agent</span>
          <p class="desc">推出 AI IDE + CLI，任务级代码生成，快手研发覆盖率突破 <span class="highlight">70%</span></p>
        </div>
      </div>
      
      <div class="stage">
        <div class="dot"></div>
        <div class="year">2026 Q1</div>
        <div class="card">
          <div class="product-name">CodeFlicker V1.0</div>
          <span class="stage-name">AI 工程师</span>
          <p class="desc">品牌升级，向「AI 工程师」进化。覆盖率 <span class="highlight">90%+</span>，驱动 AI 代码贡献率 <span class="highlight">30% → 50%+</span></p>
        </div>
      </div>
      
      <div class="stage">
        <div class="dot"></div>
        <div class="year">2026 Q2</div>
        <div class="card">
          <div class="product-name">MyFlicker V1.0</div>
          <span class="stage-name">AI 工作伙伴</span>
          <p class="desc">能力横向扩展，面向全体员工开始陪伴之旅</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
